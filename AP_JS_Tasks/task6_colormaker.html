<!DOCTYPE html>
<html>
<head>
    <title>Task 6 - Color Maker</title>
</head>
<body>
    <h2>Color Maker</h2>

    R <input type="range" id="r" min="0" max="255" value="0" oninput="updateColor()"> <br><br>
    G <input type="range" id="g" min="0" max="255" value="0" oninput="updateColor()"> <br><br>
    B <input type="range" id="b" min="0" max="255" value="0" oninput="updateColor()"> <br><br>

    <p id="colorText">rgb(0, 0, 0)</p>

    <script>
        function updateColor() {
            var r = document.getElementById("r").value;
            var g = document.getElementById("g").value;
            var b = document.getElementById("b").value;

            document.body.style.backgroundColor = "rgb(" + r + "," + g + "," + b + ")";
            document.getElementById("colorText").innerHTML = "rgb(" + r + ", " + g + ", " + b + ")";
        }
    </script>
</body>
</html>

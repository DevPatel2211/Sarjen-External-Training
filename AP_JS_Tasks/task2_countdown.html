<!DOCTYPE html>
<html>
<head>
    <title>Task 2 - Countdown Timer</title>
</head>
<body>
    <h2>Countdown Timer</h2>

    <button onclick="startTimer()">Start</button>
    <button onclick="stopTimer()">Stop</button>
    <button onclick="pauseTimer()">Pause</button>

    <p id="timer">0</p>

    <script>
        var count = 0;
        var timer = null;
        var paused = false;

        function startTimer() {
            if (timer != null) {
                return;
            }
            count = 0;
            paused = false;
            document.getElementById("timer").innerHTML = count;

            timer = setInterval(function() {
                if (!paused) {
                    count = count + 1;
                    document.getElementById("timer").innerHTML = count;

                    if (count == 10) {
                        clearInterval(timer);
                        timer = null;
                        alert("Counter reached 10! Stopping.");
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timer);
            timer = null;
            count = 0;
            paused = false;
            document.getElementById("timer").innerHTML = 0;
        }

        function pauseTimer() {
            paused = !paused;
        }
    </script>
</body>
</html>

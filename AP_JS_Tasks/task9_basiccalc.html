<!DOCTYPE html>
<html>
<head>
    <title>Task 9 - Basic Calc</title>
</head>
<body>
    <h2>Basic Calc</h2>

    num1: <input type="text" id="num1"> <br><br>
    num2: <input type="text" id="num2"> <br><br>
    result: <input type="text" id="result" readonly> <br><br>

    <button onclick="calculate('sum')">SUM</button>
    <button onclick="calculate('sub')">SUB</button>
    <button onclick="calculate('mul')">MUL</button>
    <button onclick="calculate('div')">DIV</button>

    <script>
        function calculate(operation) {
            var num1 = parseFloat(document.getElementById("num1").value);
            var num2 = parseFloat(document.getElementById("num2").value);
            var result;

            if (operation == "sum") {
                result = num1 + num2;
            } else if (operation == "sub") {
                result = num1 - num2;
            } else if (operation == "mul") {
                result = num1 * num2;
            } else if (operation == "div") {
                if (num2 == 0) {
                    result = "Cannot divide by 0";
                } else {
                    result = num1 / num2;
                }
            }

            document.getElementById("result").value = result;
        }
    </script>
</body>
</html>
